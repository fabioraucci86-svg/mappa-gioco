<!DOCTYPE html>
<html>
<head>
    <title>Mappa Italia</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; background-color: #FDF6E3; } 
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', {
            center: [41.8719, 12.5674],
            zoom: 6,
            minZoom: 5,
            maxZoom: 10,
            zoomControl: false 
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        var urlProvince = 'https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_provinces.geojson';
        fetch(urlProvince)
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function (feature) {
                        return { color: "#B22222", weight: 0.4, opacity: 0.4, fillOpacity: 0.0 };
                    }
                }).addTo(map);
            });

        var urlRegioni = 'https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson';
        fetch(urlRegioni)
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function (feature) {
                        return { color: "#2F2F2F", weight: 0.9, opacity: 0.5, fillOpacity: 0.0 };
                    },
                    interactive: false 
                }).addTo(map);
            });

        var markerGiocatore;

        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            if (markerGiocatore) {
                markerGiocatore.setLatLng(e.latlng);
            } else {
                markerGiocatore = L.marker(e.latlng).addTo(map);
            }

            // ECCO LA MODIFICA DEL TUO AMICO: USIAMO IL CHANNEL DI FLUTTERFLOW
            if (window.FFJavaScriptChannel) {
                // Inviamo le coordinate separate da virgola
                window.FFJavaScriptChannel.postMessage(lat + "," + lng);
            }
        });
    </script>
</body>
</html>
