<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItalGeo Map - Pro Version</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body { margin: 0; padding: 0; background-color: #EBE8DF; }
        #map { width: 100vw; height: 100vh; }
        
        path.leaflet-interactive {
            fill: #FDF6E3; 
            fill-opacity: 0.0; 
            stroke: #d3ccc0;   
            stroke-width: 0.5; 
            transition: fill-opacity 0.2s, stroke-width 0.2s;
        }
        
        /* Hover per la selezione, attivo solo nelle modalità normali */
        .hover-enabled path.leaflet-interactive:hover { 
            fill: #EBE0C9; 
            fill-opacity: 0.6; 
            stroke-width: 1.0; 
        }
        
        .leaflet-control-zoom { display: block !important; }
        .leaflet-control-attribution { font-size: 8px; }

        .bersaglio-target {
            filter: drop-shadow(0px 0px 8px #00ff00) drop-shadow(0px 0px 15px #00ff00) !important;
            z-index: 1000 !important;
        }
    </style>
</head>
<body>
    <div id="map" class="hover-enabled"></div>

    <script>
        // --- 1. VARIABILI DI STATO ---
        let TARGET_LAT = 0.0;
        let TARGET_LON = 0.0;
        let TARGET_NOME_PROVINCIA = ""; 
        let LIVELLO_DIFFICOLTA = "Facile"; // Default
        // Legge la difficoltà direttamente dall'URL
const parametriUrl = new URLSearchParams(window.location.search);
if (parametriUrl.has('difficolta')) {
    LIVELLO_DIFFICOLTA = parametriUrl.get('difficolta');
}

        let lastClickedLat = null;
        let lastClickedLon = null;
        let lastClickedProvincia = ""; 
        
        let markerGiocatore = null;
        let markerBersaglioReale = null;
        let lineaCollegamento = null;    
        
        // Salviamo i layer per poterli accendere/spegnere
        let layerRegioni = null;
        let layerProvince = null;
        let layerItaliaOutline = null;

        var map = L.map('map', {
            zoomControl: true,
            scrollWheelZoom: true,
            doubleClickZoom: true,
            touchZoom: true
        }).setView([41.8719, 12.5674], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        setTimeout(function () { map.invalidateSize(); }, 500);

        var iconaPersonalizzata = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/fabioraucci86-svg/mappa-gioco/main/Bandieretta.png',
            iconSize: [30, 30],
            iconAnchor: [2, 26] 
        });

        var iconaTarget = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/fabioraucci86-svg/mappa-gioco/main/Bandieretta.png',
            iconSize: [30, 30],
            iconAnchor: [2, 26],
            className: 'bersaglio-target' 
        });

        // --- 2. ASCOLTATORE COMANDI DA FLUTTERFLOW ---
        window.addEventListener("message", function(event) {
            
            // IMPOSTA LA DIFFICOLTÀ (Per la modalità Impossibile)
            if (event.data?.type === "INIT") {
                LIVELLO_DIFFICOLTA = event.data.difficolta || "Facile";
                console.log("MAPPA: Difficoltà impostata su ->", LIVELLO_DIFFICOLTA);
                aggiornaVistaMappa(LIVELLO_DIFFICOLTA);
            }

            // RICEVE LE COORDINATE DEL BERSAGLIO
            if (event.data?.type === "TARGET") {
                TARGET_LAT = event.data.lat;
                TARGET_LON = event.data.lon;
                TARGET_NOME_PROVINCIA = event.data.nomeProvincia || ""; 
                
                // Pulisce il round precedente
                if (markerBersaglioReale) map.removeLayer(markerBersaglioReale);
                if (lineaCollegamento) map.removeLayer(lineaCollegamento);
                if (markerGiocatore && markerGiocatore.getElement()) {
                    markerGiocatore.getElement().style.filter = "none";
                }
            } 
            
            if (event.data?.type === "CONFERMA") {
                calcolaEInviaRisultato();
            }
        });

        // --- 3. GESTIONE DELLA VISTA MAPPA (MODALITÀ IMPOSSIBILE) ---
        function aggiornaVistaMappa(difficolta) {
            // Pulisce i layer esistenti
            if (layerRegioni) map.removeLayer(layerRegioni);
            if (layerProvince) map.removeLayer(layerProvince);
            if (layerItaliaOutline) map.removeLayer(layerItaliaOutline);

            let mapDiv = document.getElementById("map");

            if (difficolta === "Impossibile") {
                // MODALITÀ IMPOSSIBILE: Niente province interattive, solo la base muta
                mapDiv.classList.remove("hover-enabled");
                
                fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson')
                    .then(res => res.json())
                    .then(data => {
                        layerItaliaOutline = L.geoJSON(data, { 
                            style: { color: '#555555', weight: 2.0, fillOpacity: 0.1, fillColor: '#cccccc' },
                            interactive: false 
                        }).addTo(map);
                    });
                    
                // Abilitiamo il click libero ovunque sulla mappa base
                map.on('click', function(e) {
                    gestisciClickMappa(e.latlng, "Sconosciuta"); 
                });

            } else {
                // MODALITÀ NORMALI: Mostra Province e Regioni cliccabili
                mapDiv.classList.add("hover-enabled");
                map.off('click'); // Spegne il click libero per usare quello dei poligoni

                fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson')
                    .then(res => res.json())
                    .then(data => {
                        layerRegioni = L.geoJSON(data, { style: { color: '#947B5D', weight: 1.5, fillOpacity: 0.0, interactive: false } }).addTo(map);
                    });

                fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_provinces.geojson')
                    .then(res => res.json())
                    .then(data => {
                        layerProvince = L.geoJSON(data, {
                            onEachFeature: function (feature, layer) {
                                layer.on('click', function (e) {
                                    let nomeProv = feature.properties.prov_name || "";
                                    gestisciClickMappa(e.latlng, nomeProv);
                                    L.DomEvent.stopPropagation(e);
                                });
                            }
                        }).addTo(map);
                    });
            }
        }

        // --- 4. CALCOLO E INVIO A FLUTTERFLOW ---
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))); 
        }

        function calcolaEInviaRisultato() {
            if (!lastClickedLat) return;

            // Calcolo distanza matematica
            let distanzaFinale = getDistanceFromLatLonInKm(lastClickedLat, lastClickedLon, TARGET_LAT, TARGET_LON);
            
            // Animazioni sulla mappa (Bersaglio e linea)
            markerBersaglioReale = L.marker([TARGET_LAT, TARGET_LON], { icon: iconaTarget }).addTo(map);

            lineaCollegamento = L.polyline([[lastClickedLat, lastClickedLon], [TARGET_LAT, TARGET_LON]], {
                color: '#4a4a4a', weight: 2, dashArray: '5, 10'
            }).addTo(map);

            // COLORI DEL MARKER BASATI SULLE TUE REGOLE (20km e 100km)
            if (markerGiocatore && markerGiocatore.getElement()) {
                let iconaDom = markerGiocatore.getElement();
                if (distanzaFinale <= 20) {
                    // Verde = Vittoria/Ottimo
                    iconaDom.style.filter = "drop-shadow(0px 0px 8px #28a745) drop-shadow(0px 0px 15px #28a745)";
                } else if (distanzaFinale <= 100) {
                    // Arancione = Medio/Vicino
                    iconaDom.style.filter = "drop-shadow(0px 0px 8px #ffc107) drop-shadow(0px 0px 15px #ffc107)"; 
                } else {
                    // Rosso = Sbagliato/Lontano
                    iconaDom.style.filter = "drop-shadow(0px 0px 8px #dc3545) drop-shadow(0px 0px 15px #dc3545)";
                }
            }

            // Allarga la visuale per vedere entrambi i punti
            let confini = L.latLngBounds([[lastClickedLat, lastClickedLon], [TARGET_LAT, TARGET_LON]]);
            map.fitBounds(confini, { padding: [50, 50], maxZoom: 12 });

            // Invia la distanza a FlutterFlow (che applicherà le sue regole per dare i punti)
            window.parent.postMessage({
                "type": "DISTANCE_RESULT",
                "value": distanzaFinale.toFixed(2)
            }, "*");
        }

        function gestisciClickMappa(latlng, nomeProvinciaCliccata) {
            if (markerGiocatore) markerGiocatore.setLatLng(latlng);
            else markerGiocatore = L.marker(latlng, { icon: iconaPersonalizzata }).addTo(map);

            lastClickedLat = latlng.lat;
            lastClickedLon = latlng.lng;
            lastClickedProvincia = nomeProvinciaCliccata;
        }

        // Avvio mappa (assicurandosi che i layer partano in base al livello base)
        aggiornaVistaMappa(LIVELLO_DIFFICOLTA);
    </script>
</body>
</html>
