<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItalGeo Map - Polling Version</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body { margin: 0; padding: 0; background-color: #EBE8DF; }
        #map { width: 100vw; height: 100vh; }
        
        /* Stile Province (Sottili) */
        path.leaflet-interactive {
            fill: #FDF6E3; 
            fill-opacity: 0.0; 
            stroke: #d3ccc0;   
            stroke-width: 0.5; 
            transition: fill-opacity 0.2s, stroke-width 0.2s;
        }
        path.leaflet-interactive:hover { 
            fill: #EBE0C9; 
            fill-opacity: 0.6; 
            stroke-width: 1.0; 
        }
        
        .leaflet-control-zoom { display: block !important; }
        .leaflet-control-attribution { font-size: 8px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // --- 1. VARIABILI GLOBALI (La "Lavagna" per il polling) ---
        window.lastDistance = null;
        window.lastScore = null;
        
        let TARGET_LAT = 0.0;
        let TARGET_LON = 0.0;
        let markerGiocatore = null;
        let targetMarker = null; // Per mostrare dove era il punto reale
        let line = null;         // Linea tra click e target

        // Inizializzazione mappa
        var map = L.map('map', {
            zoomControl: true,
            scrollWheelZoom: true,
            doubleClickZoom: true,
            touchZoom: true
        }).setView([41.8719, 12.5674], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        var iconaPersonalizzata = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2776/2776067.png',
            iconSize: [40, 40],
            iconAnchor: [20, 40] 
        });

        // --- 2. RICEZIONE TARGET (Con controllo tipo messaggio) ---
        window.addEventListener("message", function(event) {
            // Supportiamo sia il formato stringa che l'oggetto suggerito dal tecnico
            if (event.data?.type === "TARGET") {
                TARGET_LAT = event.data.lat;
                TARGET_LON = event.data.lon;
                console.log("Target ricevuto (Oggetto):", TARGET_LAT, TARGET_LON);
            } else if (typeof event.data === 'string' && event.data.includes(',')) {
                let coords = event.data.split(',');
                TARGET_LAT = parseFloat(coords[0]);
                TARGET_LON = parseFloat(coords[1]);
                console.log("Target ricevuto (Stringa):", TARGET_LAT, TARGET_LON);
            }
        });

        // Formula Haversine (Distanza)
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        // Sistema Punteggio (Stile GeoGuessr)
        function calcolaPunteggio(dist) {
            const maxScore = 5000;
            // Formula: il punteggio cala esponenzialmente con la distanza
            return Math.round(maxScore * Math.exp(-dist / 200));
        }

        // --- 3. FUNZIONE CORE: PIAZZA E SCRIVI DATI ---
        function piazzaSegnalino(latlng) {
            // Sposta marker giocatore
            if (markerGiocatore) markerGiocatore.setLatLng(latlng);
            else markerGiocatore = L.marker(latlng, { icon: iconaPersonalizzata }).addTo(map);

            if (TARGET_LAT !== 0.0) {
                const dist = getDistanceFromLatLonInKm(latlng.lat, latlng.lng, TARGET_LAT, TARGET_LON);
                const score = calcolaPunteggio(dist);

                // 👉 SALVATAGGIO SULLA LAVAGNA (Polling)
                window.lastDistance = dist.toFixed(2);
                window.lastScore = score;

                // TENTATIVO POSTMESSAGE (Come backup)
                try {
                    window.top.postMessage(dist.toFixed(2), "*");
                } catch(e) {}
            }
        }

        // 4. DISEGNA I CONFINI REGIONI (Solo estetici)
        fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: '#947B5D', weight: 1.5, fillOpacity: 0.0, interactive: false }
                }).addTo(map);
            });

        // 5. DISEGNA LE PROVINCE (Interattive)
        fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_provinces.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: function (feature, layer) {
                        layer.on('click', function (e) {
                            piazzaSegnalino(e.latlng);
                            L.DomEvent.stopPropagation(e);
                        });
                    }
                }).addTo(map);
            });

    </script>
</body>
</html>
