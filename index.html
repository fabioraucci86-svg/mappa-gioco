<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItalGeo Map - Pro Version</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body { margin: 0; padding: 0; background-color: #EBE8DF; }
        #map { width: 100vw; height: 100vh; }
        
        path.leaflet-interactive {
            fill: #FDF6E3; 
            fill-opacity: 0.0; 
            stroke: #d3ccc0;   
            stroke-width: 0.5; 
            transition: fill-opacity 0.2s, stroke-width 0.2s;
        }
        path.leaflet-interactive:hover { 
            fill: #EBE0C9; 
            fill-opacity: 0.6; 
            stroke-width: 1.0; 
        }
        
        .leaflet-control-zoom { display: block !important; }
        .leaflet-control-attribution { font-size: 8px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // --- 1. VARIABILI DI STATO ---
        let TARGET_LAT = 0.0;
        let TARGET_LON = 0.0;
        let TARGET_NOME_PROVINCIA = ""; // Il nome della provincia da indovinare

        let lastClickedLat = null;
        let lastClickedLon = null;
        let lastClickedProvincia = ""; // La provincia dove l'utente ha cliccato
        
        let markerGiocatore = null;

        // Inizializzazione mappa
        var map = L.map('map', {
            zoomControl: true,
            scrollWheelZoom: true,
            doubleClickZoom: true,
            touchZoom: true
        }).setView([41.8719, 12.5674], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        var iconaPersonalizzata = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/fabioraucci86-svg/mappa-gioco/main/Bandieretta.png',
            iconSize: [30, 30],
            iconAnchor: [1, 30] 
        });

        // --- 2. ASCOLTATORE COMANDI DA FLUTTERFLOW ---
        window.addEventListener("message", function(event) {
            // Ricezione Target (Coordinate + Nome Provincia)
            if (event.data?.type === "TARGET") {
                TARGET_LAT = event.data.lat;
                TARGET_LON = event.data.lon;
                TARGET_NOME_PROVINCIA = event.data.nomeProvincia; 
                console.log("MAPPA: Target impostato ->", TARGET_NOME_PROVINCIA);
            } 
            
            // Ricezione Comando Conferma
            if (event.data?.type === "CONFERMA") {
                calcolaEInviaRisultato();
            }
        });

        // Formula Haversine per la distanza
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        // --- 3. LOGICA DI INVIO RISULTATO ---
        function calcolaEInviaRisultato() {
            if (!lastClickedLat) {
                console.log("MAPPA: Nessun punto cliccato!");
                return;
            }

            let distanzaFinale = 0;

            // CONTROLLO SAGOMA: Se la provincia cliccata è quella corretta -> 0 KM
            if (lastClickedProvincia && TARGET_NOME_PROVINCIA && 
                lastClickedProvincia.toLowerCase().trim() === TARGET_NOME_PROVINCIA.toLowerCase().trim()) {
                distanzaFinale = 0.00;
                console.log("MAPPA: Centro pieno sulla provincia! 0 KM");
            } else {
                distanzaFinale = getDistanceFromLatLonInKm(lastClickedLat, lastClickedLon, TARGET_LAT, TARGET_LON);
                console.log("MAPPA: Calcolo distanza dal centro:", distanzaFinale);
            }

            // Invia il risultato a FlutterFlow
            window.parent.postMessage({
                "type": "DISTANCE_RESULT",
                "value": distanzaFinale.toFixed(2)
            }, "*");
        }

        function gestisciClickMappa(latlng, nomeProvinciaCliccata) {
            // Muove il marker
            if (markerGiocatore) markerGiocatore.setLatLng(latlng);
            else markerGiocatore = L.marker(latlng, { icon: iconaPersonalizzata }).addTo(map);

            // Memorizza i dati del click localmente
            lastClickedLat = latlng.lat;
            lastClickedLon = latlng.lng;
            lastClickedProvincia = nomeProvinciaCliccata;
            
            console.log("MAPPA: Click registrato su " + nomeProvinciaCliccata + ". In attesa di conferma...");
        }

        // 4. DISEGNA I CONFINI REGIONI (Solo visuale)
        fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: '#947B5D', weight: 1.5, fillOpacity: 0.0, interactive: false }
                }).addTo(map);
            });

        // 5. DISEGNA LE PROVINCE (Interattive per il click)
        fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_provinces.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: function (feature, layer) {
                        layer.on('click', function (e) {
                            // Prende il nome della provincia dai dati GeoJSON
                            let nomeProv = feature.properties.prov_name || "";
                            gestisciClickMappa(e.latlng, nomeProv);
                            L.DomEvent.stopPropagation(e);
                        });
                    }
                }).addTo(map);
            });

    </script>
</body>
</html>
