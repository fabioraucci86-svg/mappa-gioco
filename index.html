<!DOCTYPE html>
<html>
<head>
    <title>Mappa Italia</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; background-color: #FDF6E3; } 
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', {
            center: [41.8719, 12.5674],
            zoom: 6,
            minZoom: 5,
            maxZoom: 10,
            zoomControl: false 
        });

        // Sfondo pulito senza scritte
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // --- 1. CARICHIAMO LE PROVINCE (Linee interne ben visibili) ---
        var urlProvince = 'https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_provinces.geojson';
        fetch(urlProvince)
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: "#8B4513", // Marrone scuro (SaddleBrown)
                            weight: 1.5,      // Spessore raddoppiato rispetto a prima!
                            opacity: 0.8,
                            fillOpacity: 0.0
                        };
                    }
                }).addTo(map);
            });

        // --- 2. CARICHIAMO LE REGIONI (Sopra le province, linee belle grosse) ---
        var urlRegioni = 'https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson';
        fetch(urlRegioni)
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function (feature) {
                        return {
                            color: "#2B2B2B", // Antracite/Quasi Nero
                            weight: 3.5,      // Molto marcato (spessore triplo)
                            opacity: 1.0,
                            fillOpacity: 0.0
                        };
                    },
                    interactive: false // Fondamentale: impedisce che le linee grosse blocchino il clic del mouse
                }).addTo(map);
            });

        var markerGiocatore;

        map.on('click', function(e) {
            var lat = e.latlng.lat;
            var lng = e.latlng.lng;

            if (markerGiocatore) {
                markerGiocatore.setLatLng(e.latlng);
            } else {
                markerGiocatore = L.marker(e.latlng).addTo(map);
            }

            // Invia le coordinate a FlutterFlow
            if (window.Print) {
                window.Print.postMessage(lat + "," + lng);
            }
        });
    </script>
</body>
</html>
