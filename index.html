<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa Italia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body { margin: 0; padding: 0; background-color: #EBE8DF; }
        #map { width: 100vw; height: 100vh; }
        
        /* Confini delle province resi SOTTILISSIMI e chiarissimi */
        path.leaflet-interactive {
            fill: #FDF6E3; 
            fill-opacity: 0.0; 
            stroke: #d3ccc0;   /* Colore grigio/sabbia molto chiaro */
            stroke-width: 0.5; /* Bordo dimezzato, quasi invisibile */
            transition: fill-opacity 0.2s, stroke-width 0.2s;
        }
        
        /* Effetto "illuminazione" al passaggio del mouse */
        path.leaflet-interactive:hover { 
            fill: #EBE0C9; 
            fill-opacity: 0.6; 
            stroke-width: 1.0; /* Torna leggermente visibile al passaggio */
        }
        
        .leaflet-control-zoom { display: block !important; }
        .leaflet-control-attribution { font-size: 8px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // Variabili globali
        let TARGET_LAT = 0.0;
        let TARGET_LON = 0.0;
        let markerGiocatore = null;

        // Inizializzazione della mappa
        var map = L.map('map', {
            zoomControl: true,
            scrollWheelZoom: true,
            doubleClickZoom: true,
            touchZoom: true
        }).setView([41.8719, 12.5674], 6);

        // Aggiunta dello sfondo (strade, mari, ecc.)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // IL TUO SEGNALINO PERSONALIZZATO
        var iconaPersonalizzata = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2776/2776067.png', // Ricorda di mettere il tuo link PNG!
            iconSize: [40, 40],
            iconAnchor: [20, 40] 
        });

        // Riceve le coordinate da FlutterFlow
        window.addEventListener("message", function(event) {
            if (event.data && typeof event.data === 'string' && event.data.includes(',')) {
                let coords = event.data.split(',');
                TARGET_LAT = parseFloat(coords[0]);
                TARGET_LON = parseFloat(coords[1]);
            }
        });

        // Formula per calcolare i KM in linea d'aria
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        // Funzione che sposta il segnalino e invia i dati a FlutterFlow in tempo reale
        function piazzaSegnalino(latlng) {
            if (markerGiocatore) {
                markerGiocatore.setLatLng(latlng);
            } else {
                markerGiocatore = L.marker(latlng, { icon: iconaPersonalizzata }).addTo(map);
            }

            // Calcola la distanza
            let distanzaKm = 0;
            if (TARGET_LAT !== 0.0) {
                distanzaKm = getDistanceFromLatLonInKm(latlng.lat, latlng.lng, TARGET_LAT, TARGET_LON);
            }
            
            // Invia immediatamente il numero di KM a FlutterFlow
            window.parent.postMessage(distanzaKm.toFixed(2), "*");
        }

        // Se clicchi sul mare o fuori dall'Italia
        map.on('click', function(e) {
            piazzaSegnalino(e.latlng);
        });

        // 1. DISEGNA I CONFINI DELLE REGIONI (Più spessi, solo visivi)
        var urlRegioni = 'https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson';
        fetch(urlRegioni)
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: '#947B5D',   // Colore del bordo della regione
                        weight: 2.5,        // Spessore del bordo (puoi modificarlo)
                        fillOpacity: 0.0,   // Interno trasparente
                        interactive: false  // Lascia passare i click alle province sottostanti
                    }
                }).addTo(map);
            })
            .catch(error => console.error('Errore GeoJSON Regioni:', error));

        // 2. Disegna le province italiane
        var urlProvince = 'https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_provinces.geojson';
        fetch(urlProvince)
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: function (feature, layer) {
                        // Se clicchi dentro una provincia
                        layer.on('click', function (e) {
                            piazzaSegnalino(e.latlng);
                            L.DomEvent.stopPropagation(e);
                        });
                    }
                }).addTo(map);
            })
            .catch(error => console.error('Errore GeoJSON:', error));

    </script>
</body>
</html>
