<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ItalGeo Quiz Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body { margin: 0; padding: 0; background-color: #EBE8DF; }
        #map { width: 100vw; height: 100vh; }
        path.leaflet-interactive {
            fill: #FDF6E3; fill-opacity: 1; stroke: #8C7B65; stroke-width: 1.5; transition: fill 0.3s;
        }
        path.leaflet-interactive:hover { fill: #EBE0C9; }
        .leaflet-control-zoom { display: none; }
        .leaflet-control-attribution { font-size: 8px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Variabili per il bersaglio (vengono aggiornate da FlutterFlow)
        let TARGET_LAT = 0.0;
        let TARGET_LON = 0.0;
        let markerGiocatore;

        var map = L.map('map').setView([41.8719, 12.5674], 6);

        // Ascolta il messaggio da FlutterFlow con le coordinate della città estratta
        window.addEventListener("message", function(event) {
            console.log("Messaggio ricevuto: ", event.data);
            if (event.data && typeof event.data === 'string' && event.data.includes(',')) {
                let coords = event.data.split(',');
                TARGET_LAT = parseFloat(coords[0]);
                TARGET_LON = parseFloat(coords[1]);
            }
        });

        // Formula di Haversine (dal tuo amico)
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        map.on('click', function(e) {
            const clickLat = e.latlng.lat;
            const clickLon = e.latlng.lng;

            // Sposta o crea il pin del giocatore
            if (markerGiocatore) {
                markerGiocatore.setLatLng(e.latlng);
            } else {
                markerGiocatore = L.marker(e.latlng).addTo(map);
            }

            // Calcola la distanza
            const distanzaKm = getDistanceFromLatLonInKm(clickLat, clickLon, TARGET_LAT, TARGET_LON);

            // Invia a FlutterFlow (Distanza,LatTocco,LngTocco)
            if (window.FFJavaScriptChannel) {
                window.FFJavaScriptChannel.postMessage(distanzaKm.toFixed(2) + "|" + clickLat + "," + clickLon);
            }
        });

        fetch('https://raw.githubusercontent.com/openbiostat/geojson-italy/master/limits_it_provinces.json')
            .then(response => response.json())
            .then(data => L.geoJSON(data).addTo(map))
            .catch(error => console.error('Errore GeoJSON:', error));

        map.scrollWheelZoom.disable();
    </script>
</body>
</html>
