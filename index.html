<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItalGeo Map - Polling Version</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body { margin: 0; padding: 0; background-color: #EBE8DF; }
        #map { width: 100vw; height: 100vh; }
        
        /* Stile Province (Sottili) - MANTENUTO */
        path.leaflet-interactive {
            fill: #FDF6E3; 
            fill-opacity: 0.0; 
            stroke: #d3ccc0;   
            stroke-width: 0.5; 
            transition: fill-opacity 0.2s, stroke-width 0.2s;
        }
        path.leaflet-interactive:hover { 
            fill: #EBE0C9; 
            fill-opacity: 0.6; 
            stroke-width: 1.0; 
        }
        
        .leaflet-control-zoom { display: block !important; }
        .leaflet-control-attribution { font-size: 8px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // --- 1. VARIABILI GLOBALI (LAVAGNA) ---
        window.lastDistance = 123.45; // Test iniziale
        window.lastScore = 5000;
        
        let TARGET_LAT = 0.0;
        let TARGET_LON = 0.0;
        let markerGiocatore = null;

        // Inizializzazione mappa
        var map = L.map('map', {
            zoomControl: true,
            scrollWheelZoom: true,
            doubleClickZoom: true,
            touchZoom: true
        }).setView([41.8719, 12.5674], 6);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        var iconaPersonalizzata = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2776/2776067.png',
            iconSize: [40, 40],
            iconAnchor: [20, 40] 
        });

        // --- 2. RICEZIONE TARGET (MODIFICATA PER OGGETTI) ---
        window.addEventListener("message", function(event) {
            console.log("MAPPA: Messaggio ricevuto:", event.data);
            
            // Gestione formato OGGETTO (quello nuovo del widget Dart)
            if (event.data?.type === "TARGET") {
                TARGET_LAT = event.data.lat;
                TARGET_LON = event.data.lon;
                console.log("MAPPA: Bersaglio impostato (Oggetto):", TARGET_LAT, TARGET_LON);
            } 
            // Gestione formato STRINGA (vecchio formato per compatibilità)
            else if (typeof event.data === 'string' && event.data.includes(',')) {
                let coords = event.data.split(',');
                TARGET_LAT = parseFloat(coords[0]);
                TARGET_LON = parseFloat(coords[1]);
                console.log("MAPPA: Bersaglio impostato (Stringa):", TARGET_LAT, TARGET_LON);
            }
        });

        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        function calcolaPunteggio(dist) {
            const maxScore = 5000;
            return Math.round(maxScore * Math.exp(-dist / 200));
        }

        // --- 3. FUNZIONE CORE (URLEÀ IL RISULTATO) ---
        function piazzaSegnalino(latlng) {
            if (markerGiocatore) markerGiocatore.setLatLng(latlng);
            else markerGiocatore = L.marker(latlng, { icon: iconaPersonalizzata }).addTo(map);

            console.log("MAPPA: Click a", latlng.lat, latlng.lng);

            if (TARGET_LAT !== 0.0) {
                const dist = getDistanceFromLatLonInKm(latlng.lat, latlng.lng, TARGET_LAT, TARGET_LON);
                const score = calcolaPunteggio(dist);
                const risultato = dist.toFixed(2);

                // Aggiorniamo window per il polling (Piano B)
                window.lastDistance = risultato;
                window.lastScore = score;
                
                console.log("MAPPA: Distanza calcolata:", risultato);

                // URLEÀ il risultato al genitore (Piano A - Il più potente)
                try {
                    window.parent.postMessage({
                        "type": "DISTANCE_RESULT",
                        "value": risultato
                    }, "*");
                } catch(e) {
                    console.error("MAPPA: Errore postMessage:", e);
                }
            } else {
                console.warn("MAPPA: Bersaglio non ancora ricevuto (è ancora 0.0)");
            }
        }

        // 4. DISEGNA I CONFINI REGIONI
        fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_regions.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: '#947B5D', weight: 1.5, fillOpacity: 0.0, interactive: false }
                }).addTo(map);
            });

        // 5. DISEGNA LE PROVINCE
        fetch('https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_provinces.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: function (feature, layer) {
                        layer.on('click', function (e) {
                            piazzaSegnalino(e.latlng);
                            L.DomEvent.stopPropagation(e);
                        });
                    }
                }).addTo(map);
            });

    </script>
</body>
</html>
