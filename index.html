<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ItalGeo Quiz Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <style>
        body { margin: 0; padding: 0; background-color: #EBE8DF; }
        #map { width: 100vw; height: 100vh; }
        
        /* Stile delle province al passaggio del mouse */
        path.leaflet-interactive {
            fill: #FDF6E3; fill-opacity: 0.1; stroke: #8C7B65; stroke-width: 1.5; transition: fill 0.3s;
        }
        path.leaflet-interactive:hover { fill: #EBE0C9; fill-opacity: 0.6; }
        
        .leaflet-control-attribution { font-size: 8px; }

        /* Stile del tasto Conferma (inizialmente nascosto) */
        #btn-conferma {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000; /* Lo tiene sopra la mappa */
            padding: 15px 30px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            display: none; /* Appare solo quando metti il segnalino */
        }
        #btn-conferma:hover { background-color: #34495e; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <button id="btn-conferma">Conferma Posizione</button>

    <script>
        // Coordinate bersaglio (ricevute da FlutterFlow)
        let TARGET_LAT = 0.0;
        let TARGET_LON = 0.0;
        let markerGiocatore = null;
        let coordinateScelte = null; // Memorizza dove l'utente ha cliccato

        var map = L.map('map').setView([41.8719, 12.5674], 6);

        // Mappa di sfondo
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // IL TUO SEGNALINO PERSONALIZZATO
        var iconaPersonalizzata = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2776/2776067.png', // Sostituisci con l'URL del tuo PNG!
            iconSize: [40, 40],
            iconAnchor: [20, 40] // La "punta" del segnalino che tocca terra
        });

        // Ascolta il messaggio da FlutterFlow
        window.addEventListener("message", function(event) {
            if (event.data && typeof event.data === 'string' && event.data.includes(',')) {
                let coords = event.data.split(',');
                TARGET_LAT = parseFloat(coords[0]);
                TARGET_LON = parseFloat(coords[1]);
            }
        });

        // Formula matematica
        function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        // Funzione per posizionare il segnalino
        function piazzaSegnalino(latlng) {
            coordinateScelte = latlng;

            if (markerGiocatore) {
                markerGiocatore.setLatLng(latlng);
            } else {
                markerGiocatore = L.marker(latlng, { icon: iconaPersonalizzata }).addTo(map);
                // Mostra il tasto conferma ora che il segnalino c'è
                document.getElementById('btn-conferma').style.display = 'block';
            }
        }

        // Al tocco della mappa
        map.on('click', function(e) {
            piazzaSegnalino(e.latlng);
        });

        // Click sul tasto Conferma Posizione
        document.getElementById('btn-conferma').addEventListener('click', function() {
            if (!coordinateScelte) return;

            let distanzaKm = 0;
            if (TARGET_LAT !== 0.0) {
                distanzaKm = getDistanceFromLatLonInKm(coordinateScelte.lat, coordinateScelte.lng, TARGET_LAT, TARGET_LON);
            }

            // Invia SOLTANTO ORA il numero dei chilometri a FlutterFlow
            window.parent.postMessage(distanzaKm.toFixed(2), "*");
            
            // Opzionale: Nasconde il tasto dopo aver confermato
            this.style.display = 'none'; 
        });

        // CONFINI ITALIANI
        var urlProvince = 'https://raw.githubusercontent.com/openpolis/geojson-italy/master/geojson/limits_IT_provinces.geojson';
        fetch(urlProvince)
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    // Assicuriamoci che i click sulle province vengano passati alla mappa
                    onEachFeature: function (feature, layer) {
                        layer.on('click', function (e) {
                            piazzaSegnalino(e.latlng);
                        });
                    }
                }).addTo(map);
            })
            .catch(error => console.error('Errore GeoJSON:', error));

    </script>
</body>
</html>
